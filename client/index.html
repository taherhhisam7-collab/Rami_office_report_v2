<!doctype html>
<html lang="ar" dir="rtl">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>نظام إدارة سندات القبض</title>

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA / Mobile Web App -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e1b4b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="سندات القبض" />

    <!-- Google Fonts: Tajawal -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
    <style>
      #app-boot-screen > div > div { display: none !important; }
      #app-boot-screen img {
        content: url("/icon-512.png");
        width: min(78vw, 512px) !important;
        height: auto !important;
        max-height: 78vh;
        margin: 0 auto !important;
        object-fit: contain;
      }
      #app-boot-fallback {
        display: none;
        position: fixed;
        left: 50%;
        bottom: 12vh;
        transform: translateX(-50%);
        padding: 12px 20px;
        border-radius: 10px;
        background: #1e1b4b;
        color: white;
        font: 600 15px Tajawal, Arial, sans-serif;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="app-boot-screen" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#f5f6fa;color:#334155;font-family:Tajawal,Arial,sans-serif;text-align:center;padding:24px;direction:rtl">
      <div>
        <img src="/icon-192.png" alt="شعار سندات القبض" width="72" height="72" style="display:block;margin:0 auto 16px;border-radius:18px" />
        <div style="font-size:18px;font-weight:700">جاري تحميل التطبيق…</div>
        <div id="app-boot-message" style="font-size:13px;color:#64748b;margin-top:8px">يرجى الانتظار لحظات</div>
      </div>
      <a id="app-boot-fallback" href="/api/oauth/google/login">&#1578;&#1587;&#1580;&#1610;&#1604; &#1575;&#1604;&#1583;&#1582;&#1608;&#1604;</a>
    </div>
    <script>
      window.setTimeout(function () {
        var message = document.getElementById("app-boot-message");
        if (message && !window.__APP_BOOTED__) {
          message.textContent = "إذا لم تفتح الصفحة، اضغط تحديث مرة واحدة";
        }
      }, 10000);
    </script>
    <script>
      window.setTimeout(function () {
        if (window.__APP_BOOTED__) return;
        var fallback = document.getElementById("app-boot-fallback");
        if (fallback) fallback.style.display = "inline-flex";
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
